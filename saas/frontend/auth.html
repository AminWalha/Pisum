<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PISUM — Sign In</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/AminWalha/Pisum/refs/heads/main/logo%20V2.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2563eb;--blue-hover:#1d4ed8;--blue-light:#eff6ff;
  --ink:#111827;--ink-2:#374151;--ink-3:#6b7280;--ink-4:#e5e7eb;--ink-5:#f9fafb;
  --white:#ffffff;--bg:#f4f4f5;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.05);
  --shadow:0 4px 6px -1px rgba(0,0,0,0.07),0 2px 4px -2px rgba(0,0,0,0.05);
  --shadow-lg:0 20px 40px -8px rgba(0,0,0,0.12),0 8px 16px -4px rgba(0,0,0,0.06);
  --r-sm:8px;--r:12px;--r-lg:16px;--r-xl:20px;
  --transition:150ms cubic-bezier(0.4,0,0.2,1);
}
html,body{height:100%;-webkit-font-smoothing:antialiased}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);color:var(--ink);
  display:grid;place-items:center;min-height:100vh;padding:1.5rem
}

/* Background */
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(37,99,235,0.06) 0%,transparent 60%);
  pointer-events:none;z-index:0
}

/* Card */
.card{
  background:var(--white);border-radius:var(--r-xl);
  box-shadow:var(--shadow-lg);border:1px solid rgba(0,0,0,0.06);
  padding:2.5rem 2.25rem;width:100%;max-width:416px;
  position:relative;z-index:1;
  animation:cardIn 0.3s cubic-bezier(0.4,0,0.2,1)
}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Logo */
.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:2rem}
.logo img{width:36px;height:36px;border-radius:10px}
.logo-text{font-size:1.2rem;font-weight:800;letter-spacing:-0.03em;color:var(--ink)}

/* Tabs */
.tabs{
  display:flex;background:var(--ink-5);border-radius:var(--r);
  padding:3px;margin-bottom:2rem;gap:3px;border:1px solid var(--ink-4)
}
.tab{
  flex:1;padding:0.5rem;border:none;border-radius:9px;cursor:pointer;
  font-size:0.813rem;font-weight:600;font-family:inherit;
  transition:all var(--transition);background:transparent;color:var(--ink-3)
}
.tab.active{
  background:var(--white);color:var(--ink);
  box-shadow:var(--shadow-sm);
}
.tab:not(.active):hover{color:var(--ink-2)}

/* Form heading */
.form-title{font-size:1.25rem;font-weight:700;letter-spacing:-0.025em;margin-bottom:0.25rem;color:var(--ink)}
.form-sub{font-size:0.85rem;color:var(--ink-3);margin-bottom:1.75rem;line-height:1.5}

/* Fields */
.field{margin-bottom:1rem}
label{
  display:block;font-size:0.75rem;font-weight:600;
  color:var(--ink-2);margin-bottom:0.375rem;letter-spacing:0.01em
}
input{
  width:100%;padding:0.688rem 0.875rem;
  border:1px solid var(--ink-4);border-radius:var(--r);
  font-size:0.875rem;font-family:inherit;font-weight:400;outline:none;
  transition:border-color var(--transition),box-shadow var(--transition);
  background:var(--white);color:var(--ink)
}
input:hover{border-color:#d1d5db}
input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,0.1)}
input::placeholder{color:#9ca3af}

/* Forgot link */
.forgot-row{display:flex;justify-content:flex-end;margin-top:-0.5rem;margin-bottom:1rem}
.forgot-link{
  font-size:0.788rem;color:var(--blue);font-weight:600;
  text-decoration:none;cursor:pointer;background:none;border:none;
  padding:0;font-family:inherit;transition:color var(--transition)
}
.forgot-link:hover{color:var(--blue-hover)}

/* Primary Button */
.btn{
  width:100%;margin-top:0.5rem;padding:0.75rem;border:none;border-radius:var(--r);
  cursor:pointer;font-size:0.875rem;font-weight:600;font-family:inherit;
  background:var(--blue);color:#fff;
  transition:background var(--transition),transform var(--transition),opacity var(--transition);
  letter-spacing:-0.01em;display:flex;align-items:center;justify-content:center;gap:6px
}
.btn:hover{background:var(--blue-hover);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-secondary{
  background:var(--ink-5);color:var(--ink-2);border:1px solid var(--ink-4);margin-top:0.625rem
}
.btn-secondary:hover{background:#f3f4f6;border-color:#d1d5db;transform:translateY(-1px)}

/* Messages */
.msg{
  margin-top:0.875rem;padding:0.75rem 0.875rem;border-radius:var(--r-sm);
  font-size:0.813rem;font-weight:500;display:none;line-height:1.5
}
.msg.error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;display:block}
.msg.success{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;display:block}
.msg.info{background:var(--blue-light);color:var(--blue);border:1px solid #bfdbfe;display:block}

/* Divider */
.divider{
  display:flex;align-items:center;gap:0.75rem;
  margin:1.25rem 0;color:var(--ink-4);font-size:0.75rem;color:var(--ink-3)
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--ink-4)}

/* Footer link */
.footer-link{text-align:center;margin-top:1.5rem;font-size:0.813rem;color:var(--ink-3)}
.footer-link a{color:var(--blue);font-weight:600;text-decoration:none}
.footer-link a:hover{text-decoration:underline}

/* Password strength */
.strength-bar{height:2px;border-radius:999px;background:var(--ink-4);margin-top:0.375rem;overflow:hidden}
.strength-fill{height:100%;border-radius:999px;transition:width 0.3s cubic-bezier(0.4,0,0.2,1),background 0.3s;width:0}

/* Spinner */
.spinner{
  display:inline-block;width:15px;height:15px;
  border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;
  border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Field hint */
.field-hint{font-size:0.75rem;color:var(--ink-3);margin-top:0.25rem}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <a href="https://pisum.app" style="display:flex;align-items:center;gap:0.5rem;text-decoration:none;color:inherit;">
      <img src="https://raw.githubusercontent.com/AminWalha/Pisum/refs/heads/main/logo%20V2.png" alt="PISUM"/>
      <span class="logo-text">PISUM</span>
    </a>
  </div>

  <!-- TABS -->
  <div class="tabs" id="tabs">
    <button class="tab active" id="tab-login"  onclick="switchTab('login')">Sign In</button>
    <button class="tab"        id="tab-signup" onclick="switchTab('signup')">Create Account</button>
  </div>

  <!-- LOGIN -->
  <div id="view-login">
    <div class="form-title">Welcome back</div>
    <div class="form-sub">Sign in to your PISUM account.</div>
    <form onsubmit="handleLogin(event)">
      <div class="field">
        <label for="login-email">Email address</label>
        <input id="login-email" type="email" placeholder="you@clinic.com" required autocomplete="email"/>
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input id="login-password" type="password" placeholder="••••••••" required autocomplete="current-password"/>
      </div>
      <div class="forgot-row">
        <button type="button" class="forgot-link" onclick="switchTab('forgot')">Forgot password?</button>
      </div>
      <button class="btn" type="submit" id="btn-login">Sign In</button>
      <div class="msg" id="msg-login"></div>
    </form>
  </div>

  <!-- SIGNUP -->
  <div id="view-signup" style="display:none">
    <div class="form-title">Create your account</div>
    <div class="form-sub">Get started with PISUM — no credit card required.</div>
    <form onsubmit="handleSignup(event)">
      <div class="field">
        <label for="signup-name">Full name</label>
        <input id="signup-name" type="text" placeholder="Dr. Smith" required autocomplete="name"/>
        <div class="field-hint">Appears on your reports and in the app.</div>
      </div>
      <div class="field">
        <label for="signup-email">Email address</label>
        <input id="signup-email" type="email" placeholder="you@clinic.com" required autocomplete="email"/>
      </div>
      <div class="field">
        <label for="signup-password">Password</label>
        <input id="signup-password" type="password" placeholder="Min. 8 characters" required autocomplete="new-password" minlength="8" oninput="checkStrength(this.value)"/>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      </div>
      <div class="field">
        <label for="signup-confirm">Confirm password</label>
        <input id="signup-confirm" type="password" placeholder="••••••••" required autocomplete="new-password" minlength="8"/>
      </div>
      <button class="btn" type="submit" id="btn-signup">Create Account</button>
      <div class="msg" id="msg-signup"></div>
    </form>
  </div>

  <!-- FORGOT -->
  <div id="view-forgot" style="display:none">
    <div class="form-title">Reset your password</div>
    <div class="form-sub">Enter your email and we'll send you a reset link.</div>
    <form onsubmit="handleForgot(event)">
      <div class="field">
        <label for="forgot-email">Email address</label>
        <input id="forgot-email" type="email" placeholder="you@clinic.com" required autocomplete="email"/>
      </div>
      <button class="btn" type="submit" id="btn-forgot">Send Reset Link</button>
      <button type="button" class="btn btn-secondary" onclick="switchTab('login')">← Back to Sign In</button>
      <div class="msg" id="msg-forgot"></div>
    </form>
  </div>

  <!-- RESET -->
  <div id="view-reset" style="display:none">
    <div class="form-title">New password</div>
    <div class="form-sub">Choose a new secure password.</div>
    <form onsubmit="handleReset(event)">
      <div class="field">
        <label for="reset-password">New password</label>
        <input id="reset-password" type="password" placeholder="Min. 8 characters" required minlength="8" oninput="checkStrength(this.value)"/>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      </div>
      <div class="field">
        <label for="reset-confirm">Confirm password</label>
        <input id="reset-confirm" type="password" placeholder="••••••••" required minlength="8"/>
      </div>
      <button class="btn" type="submit" id="btn-reset">Save New Password</button>
      <div class="msg" id="msg-reset"></div>
    </form>
  </div>

  <div class="footer-link" id="footer-link">
    <a href="pricing.html">← View plans</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL  = 'https://lepqbnhrdgfetoysedbq.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxlcHFibmhyZGdmZXRveXNlZGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNjQ1MDAsImV4cCI6MjA5MDY0MDUwMH0.St12IwG0_RRKzxrbH1QRolCC2OOAaSIsK4PDmlR2Loo';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

const _redirect = new URLSearchParams(window.location.search).get('redirect') || 'dashboard.html';

function detectMode() {
  const hash = window.location.hash;
  if (hash.includes('type=recovery') || hash.includes('type=email_change')) {
    showView('reset');
    return;
  }
  const mode = new URLSearchParams(window.location.search).get('mode');
  if (mode === 'reset') showView('reset');
}

sb.auth.getSession().then(({ data }) => {
  if (data.session && !window.location.hash.includes('type=recovery')) {
    window.location.href = _redirect;
  }
});

sb.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    showView('reset');
    return;
  }
  if ((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') && session) {
    if (!document.getElementById('view-reset').style.display === 'none') return;
    window.location.href = _redirect;
  }
});

detectMode();

function showView(name) {
  ['login','signup','forgot','reset'].forEach(v => {
    document.getElementById('view-' + v).style.display = v === name ? '' : 'none';
  });
  const tabsEl  = document.getElementById('tabs');
  const footerEl = document.getElementById('footer-link');
  if (name === 'forgot' || name === 'reset') {
    tabsEl.style.display = 'none';
    footerEl.style.display = 'none';
  } else {
    tabsEl.style.display = '';
    footerEl.style.display = '';
    document.getElementById('tab-login').classList.toggle('active', name === 'login');
    document.getElementById('tab-signup').classList.toggle('active', name === 'signup');
  }
}

function switchTab(tab) { showView(tab); }

function checkStrength(pw) {
  const fills = document.querySelectorAll('.strength-fill');
  let score = 0;
  if (pw.length >= 8)  score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const colors = ['','#ef4444','#f59e0b','#3b82f6','#22c55e'];
  const widths = ['0%','30%','55%','75%','100%'];
  fills.forEach(f => {
    f.style.width = widths[score];
    f.style.background = colors[score];
  });
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
}
function clearMsg(id) {
  const el = document.getElementById(id);
  el.className = 'msg';
  el.textContent = '';
}
function setLoading(btnId, loading, defaultText) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner"></span> ' + defaultText : defaultText;
}

async function handleLogin(e) {
  e.preventDefault();
  clearMsg('msg-login');
  setLoading('btn-login', true, 'Signing in…');
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    const msg = error.message.includes('Invalid login') || error.message.includes('invalid')
      ? 'Incorrect email or password.'
      : error.message;
    showMsg('msg-login', msg, 'error');
    setLoading('btn-login', false, 'Sign In');
    return;
  }
  window.location.href = _redirect;
}

async function handleSignup(e) {
  e.preventDefault();
  clearMsg('msg-signup');
  const name     = document.getElementById('signup-name').value.trim();
  const email    = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const confirm  = document.getElementById('signup-confirm').value;
  if (password !== confirm) {
    showMsg('msg-signup', 'Passwords do not match.', 'error');
    return;
  }
  setLoading('btn-signup', true, 'Creating account…');
  const { error } = await sb.auth.signUp({
    email, password,
    options: { data: { full_name: name } },
  });
  if (error) {
    showMsg('msg-signup', error.message, 'error');
    setLoading('btn-signup', false, 'Create Account');
    return;
  }
  showMsg('msg-signup', '✓ Account created! Check your inbox to confirm your email, then sign in.', 'success');
  setLoading('btn-signup', false, 'Create Account');
}

async function handleForgot(e) {
  e.preventDefault();
  clearMsg('msg-forgot');
  setLoading('btn-forgot', true, 'Sending link…');
  const email = document.getElementById('forgot-email').value.trim();
  const resetUrl = window.location.origin + window.location.pathname + '?mode=reset';
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: resetUrl });
  if (error) {
    showMsg('msg-forgot', error.message, 'error');
  } else {
    showMsg('msg-forgot', '✓ Link sent! Check your inbox (and your spam folder).', 'success');
  }
  setLoading('btn-forgot', false, 'Send Reset Link');
}

async function handleReset(e) {
  e.preventDefault();
  clearMsg('msg-reset');
  const password = document.getElementById('reset-password').value;
  const confirm  = document.getElementById('reset-confirm').value;
  if (password !== confirm) {
    showMsg('msg-reset', 'Passwords do not match.', 'error');
    return;
  }
  setLoading('btn-reset', true, 'Saving…');
  const { error } = await sb.auth.updateUser({ password });
  if (error) {
    showMsg('msg-reset', error.message, 'error');
    setLoading('btn-reset', false, 'Save New Password');
    return;
  }
  showMsg('msg-reset', '✓ Password updated! Redirecting…', 'success');
  setTimeout(() => { window.location.href = 'dashboard.html'; }, 1800);
}
</script>
</body>
</html>
