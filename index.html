<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We'll be right back</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #333;
            text-align: center;
        }
        .container {
            padding: 40px;
            max-width: 600px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: #2c3e50;
        }
        p {
            font-size: 1.2rem;
            color: #6c757d;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        /* Animation de chargement */
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e9ecef;
            border-top-color: #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>We'll be right back</h1>
        <p>Our website is temporarily down for maintenance. We are working hard to bring it back to normal shortly.</p>
        <p>Thank you for your patience!</p>
    </div>
</body>
</html>
