# ═══════════════════════════════════════════════════════════════════
#  pyarmor.cfg — Exclusions BCC et mix-str pour PACS/RIS signal
#
#  PROBLÈME RÉSOLU :
#    --enable-bcc  : compile les fonctions en code C natif.
#                   wx.Timer NE PEUT PAS appeler une fonction C compilée.
#                   -> _on_pacs_poll doit être exclu du BCC.
#
#    --mix-str     : obfusque les string literals.
#                   Les clés JSON ("ready","patient","examen","contenu_cr")
#                   et les chemins (".pisum_data","pacs_signal.json")
#                   sont rendus illisibles -> le JSON ne se lit plus.
#                   -> Les fonctions signal doivent être exclues du mix-str.
#
#  PLACER CE FICHIER dans le même dossier que vos .py (BuildRoot).
# ═══════════════════════════════════════════════════════════════════

[bcc]
# Fonctions à NE PAS compiler en code C natif
# Format : NomFichierSansExtension:nom_fonction
#
# RÈGLE : toute fonction appelée depuis un threading.Thread OU un wx.Timer
#         doit être exclue du BCC — le code C natif n'est pas appelable
#         depuis ces contextes sous PyArmor+PyInstaller.
exclude_functions = pacs_ris_db:_pacs_signal_write
                   pacs_ris_db:_pacs_signal_read
                   pacs_ris_db:_pacs_get_path
                   pacs_ris_db:pacs_write_signal
                   pacs_ris_db:pacs_read_and_clear_signal
                   pacs_ris_db:open_pacs_ris
                   pacs_ris_db:_on_use_in_cr
                   Comptes_Rendus:_on_pacs_poll
                   Comptes_Rendus:_apply_pacs_to_ui
                   Comptes_Rendus:on_save_cr_to_pacs
                   Comptes_Rendus:toggle_dictation
                   Comptes_Rendus:on_mic_btn_click
                   Comptes_Rendus:_start_dictation
                   Comptes_Rendus:_stop_dictation
                   Comptes_Rendus:_set_mic_recording_state
                   Comptes_Rendus:_get_whisper_language
                   Comptes_Rendus:_on_whisper_text

[mix-str]
# Fonctions dont les string literals NE doivent PAS être obfusquées
exclude_functions = pacs_ris_db:_pacs_signal_write
                   pacs_ris_db:_pacs_signal_read
                   pacs_ris_db:_pacs_get_path
                   pacs_ris_db:pacs_write_signal
                   pacs_ris_db:pacs_read_and_clear_signal
                   Comptes_Rendus:_on_pacs_poll
                   Comptes_Rendus:_apply_pacs_to_ui
                   Comptes_Rendus:on_save_cr_to_pacs
                   Comptes_Rendus:toggle_dictation
                   Comptes_Rendus:on_mic_btn_click
                   Comptes_Rendus:_start_dictation
                   Comptes_Rendus:_stop_dictation
                   Comptes_Rendus:_set_mic_recording_state
                   Comptes_Rendus:_get_whisper_language
                   Comptes_Rendus:_on_whisper_text
